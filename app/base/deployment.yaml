apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: teranet-ws
  name: teranet-ws
  namespace: helloworld-ws
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: teranet-ws
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: teranet-ws
    spec:
      containers:
      - image: teranetacr.azurecr.io/my-dev/helloworld-ws:latest
        imagePullPolicy: Always
        name: helloworld-java
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
status: {}

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: teranet-ws
  name: teranet-ws
  namespace: helloworld-ws
spec:
  clusterIP: 172.30.35.18
  clusterIPs:
  - 172.30.35.18
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: teranet-ws
  sessionAffinity: None
  type: ClusterIP
status:
  loadBalancer: {}

---

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    openshift.io/host.generated: "true"
  labels:
    app: teranet-ws
  name: teranet-ws
  namespace: helloworld-ws
spec:
  host: teranet-ws-helloworld-ws.apps.a5tpcu3e.eastus.aroapp.io
  port:
    targetPort: 8080
  to:
    kind: Service
    name: teranet-ws
    weight: 100
  wildcardPolicy: None
status:
  ingress:
  - conditions:
    - status: "True"
      type: Admitted
    host: teranet-ws-helloworld-ws.apps.a5tpcu3e.eastus.aroapp.io
    routerCanonicalHostname: router-default.apps.a5tpcu3e.eastus.aroapp.io
    routerName: default
    wildcardPolicy: None