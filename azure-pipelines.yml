# specific path build
trigger:
  paths:
    include:
    - src/*
    exclude:
    - README.md

pool:
  name: teranet-s2i-jboss

variables:
  project-name-dev: 'my-dev'
  project-name-uat: 'my-uat'
  image-name: 'helloworld-ws'

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildAndPushJob
    displayName: Build and Push Job
    steps:
    - task: Docker@2
      displayName: 'Build and Push Docker image'
      inputs:
        command: 'buildAndPush'
        containerRegistry: 'teranet-acr'
        buildContext: '**'
        repository: '$(project-name-dev)/$(image-name)'
        Dockerfile: 'Dockerfile'
        tags: | 
          latest
          $(Build.BuildId)